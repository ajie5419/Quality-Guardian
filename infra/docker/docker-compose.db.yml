services:
  mysql:
    image: mysql:8.0
    container_name: qms-mysql-local
    restart: unless-stopped
    ports:
      - '127.0.0.1:3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: quality_guard
      MYSQL_USER: qms
      MYSQL_PASSWORD: qms123456
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - qms-mysql-data:/var/lib/mysql

volumes:
  qms-mysql-data:
    driver: local
