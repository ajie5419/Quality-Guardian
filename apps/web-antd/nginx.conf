server {
    listen 80;
    server_name localhost;

    # Gzip settings
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    root /usr/share/nginx/html;
    index index.html index.htm;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /_app.config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~* ^/(js|jse|css|assets|svg|png|jpg|jpeg|gif|ico|woff2?)/ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        # 'backend' matches the service name in docker-compose.yml
        # In ECS, this would be the backend service discovery name or localhost if in same task
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase upload limit for QMS photos
        client_max_body_size 50m;
    }

    # Serve uploads directly from shared volume
    location /uploads/ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri $uri/ =404;
    }

    # Health check
    location /health {
        access_log off;
        return 200 'OK';
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
    }
}
