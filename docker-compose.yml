services:
  backend:
    image: 
    container_name: qms-backend
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: always
    # 🌟 修复： expose 改为 ports，否则宿主机无法访问
    ports:
      - '127.0.0.1:3000:3000' # 仅监听本地，配合 Nginx 反向代理
    networks:
      - qms-network
    # healthcheck:
    #   test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/status']
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 60s # 给应用足够启动时间
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 512M
    volumes:
      - qms-uploads:/app/uploads
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '3'

  frontend:
    image: 
    container_name: qms-frontend
    ports:
      - '80:80'
    depends_on:
      - backend # 等待后端启动
    restart: always
    volumes:
      - qms-uploads:/usr/share/nginx/html/uploads
    networks:
      - qms-network
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '3'

  redis:
    image: redis:alpine
    container_name: qms-redis
    restart: always
    # ports:
    #   - '6379:6379'
    networks:
      - qms-network
    volumes:
      - qms-redis-data:/data
    command: redis-server --appendonly yes

networks:
  qms-network:
    driver: bridge
    name: qms-network

volumes:
  qms-uploads:
    driver: local
  qms-redis-data:
    driver: local
