name: Docker Build and Push to ACR

on:
  push:
    branches: [main]

jobs:
  build:
    # 🌟 关键：改回使用 GitHub 官方托管的服务器
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 构建并推送后端镜像
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          # 🌟 使用您的 qms 仓库，通过 tag 区分前后端
          tags: ${{ secrets.ACR_REGISTRY }}/ajie5419/qms:backend-latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 构建并推送前端镜像
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          # 🌟 使用您的 qms 仓库，通过 tag 区分前后端
          tags: ${{ secrets.ACR_REGISTRY }}/ajie5419/qms:frontend-latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/qms
            # 在云服务器上登录并拉取最新镜像
            docker login --username=${{ secrets.ACR_USERNAME }} --password=${{ secrets.ACR_PASSWORD }} ${{ secrets.ACR_REGISTRY }}
            docker-compose pull
            docker-compose up -d
            docker image prune -f
