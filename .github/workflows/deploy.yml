name: Docker Build and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: [self-hosted, macOS]
    env:
      # 使用标准 Socket 路径，配合 Docker Desktop 的 Advanced 设置
      DOCKER_HOST: unix:///var/run/docker.sock
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Build and push Backend image
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/ajie5419/qms:backend-latest
          platforms: linux/amd64

      # Build and push Frontend image
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web-antd/Dockerfile
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/ajie5419/qms:frontend-latest
          platforms: linux/amd64

  deploy:
    runs-on: [self-hosted, macOS]
    needs: build
    steps:
      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/qms
            docker login --username=${{ secrets.ACR_USERNAME }} --password=${{ secrets.ACR_PASSWORD }} ${{ secrets.ACR_REGISTRY }}
            docker-compose pull
            docker-compose up -d
            docker image prune -f
