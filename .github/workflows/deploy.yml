name: deploy

on:
  push:
    branches:
      - main
    tags:
      - 'release-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional image tag override (e.g. 1.2.4)'
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: ${{ secrets.ACR_REGISTRY }}/ajie5419/qms
      ECS_USER: ${{ secrets.ECS_USER || 'root' }}
      COMPOSE_FILE: /opt/qms/docker-compose.yml
      HEALTH_URL: http://127.0.0.1:3000/api/status
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare version
        id: version
        run: |
          REF_NAME="${GITHUB_REF_NAME}"
          EVENT="${GITHUB_EVENT_NAME}"
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [[ "$REF_NAME" == release-v* ]]; then
            VERSION="${REF_NAME#release-v}"
          else
            VERSION="$(date +%Y%m%d%H%M)-${GITHUB_SHA::7}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Login ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ secrets.ACR_REGISTRY }}" \
            --username "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build backend image
        run: |
          docker build --platform linux/amd64 \
            -f Dockerfile.backend \
            -t "$IMAGE_REPO:backend-${{ steps.version.outputs.version }}" .

      - name: Build frontend image
        run: |
          docker build --platform linux/amd64 \
            -f Dockerfile.frontend \
            -t "$IMAGE_REPO:frontend-${{ steps.version.outputs.version }}" .

      - name: Push images
        run: |
          docker push "$IMAGE_REPO:backend-${{ steps.version.outputs.version }}"
          docker push "$IMAGE_REPO:frontend-${{ steps.version.outputs.version }}"

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ env.ECS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            set -x
            TAG='${{ steps.version.outputs.version }}'
            IMAGE_REPO='${{ env.IMAGE_REPO }}'
            COMPOSE_FILE='${{ env.COMPOSE_FILE }}'
            HEALTH_URL='${{ env.HEALTH_URL }}'

            if [ ! -f "$COMPOSE_FILE" ]; then
              ALT_COMPOSE_FILE="/opt/qms/infra/docker/docker-compose.yml"
              if [ -f "$ALT_COMPOSE_FILE" ]; then
                COMPOSE_FILE="$ALT_COMPOSE_FILE"
              else
                echo "compose file not found: $COMPOSE_FILE or $ALT_COMPOSE_FILE"
                exit 1
              fi
            fi

            cp "$COMPOSE_FILE" "$COMPOSE_FILE.bak"
            rollback() {
              cp "$COMPOSE_FILE.bak" "$COMPOSE_FILE" || true
              docker compose -f "$COMPOSE_FILE" up -d redis backend frontend || true
            }
            trap 'echo "deploy failed, rolling back compose and containers"; rollback' ERR

            run_with_timeout() {
              local seconds="$1"
              shift
              if command -v timeout >/dev/null 2>&1; then
                timeout "$seconds" "$@"
              else
                "$@"
              fi
            }

            PRISMA_BIN="/app/apps/backend/node_modules/.bin/prisma"
            PRISMA_MIGRATIONS_DIR="/app/apps/backend/prisma/migrations"

            run_prisma_schema_sync() {
              local has_migrations
              has_migrations="$(docker compose -f "$COMPOSE_FILE" run --rm backend sh -lc "[ -d '$PRISMA_MIGRATIONS_DIR' ] && [ \"\$(ls -A '$PRISMA_MIGRATIONS_DIR' 2>/dev/null)\" ] && echo yes || echo no")"

              if [ "$has_migrations" = "yes" ]; then
                set +e
                local migrate_output
                migrate_output="$(run_with_timeout 240 docker compose -f "$COMPOSE_FILE" run --rm backend "$PRISMA_BIN" migrate deploy 2>&1)"
                local migrate_status=$?
                set -e
                echo "$migrate_output"

                if [ "$migrate_status" -eq 0 ]; then
                  return 0
                fi

                if echo "$migrate_output" | grep -q "P3005"; then
                  echo "Detected P3005 (non-empty existing DB without baseline). Fallback to prisma db push."
                else
                  echo "prisma migrate deploy failed"
                  return "$migrate_status"
                fi
              else
                echo "No prisma migrations found in image. Use prisma db push."
              fi

              run_with_timeout 240 docker compose -f "$COMPOSE_FILE" run --rm backend "$PRISMA_BIN" db push --skip-generate
            }

            sed -i.qms "/^  backend:/,/^  [^ ]/ s#^    image:.*#    image: ${IMAGE_REPO}:backend-${TAG}#" "$COMPOSE_FILE"
            sed -i.qms "/^  frontend:/,/^  [^ ]/ s#^    image:.*#    image: ${IMAGE_REPO}:frontend-${TAG}#" "$COMPOSE_FILE"
            rm -f "${COMPOSE_FILE}.qms"

            run_with_timeout 300 docker compose -f "$COMPOSE_FILE" pull backend frontend
            run_with_timeout 120 docker compose -f "$COMPOSE_FILE" up -d redis
            run_prisma_schema_sync
            run_with_timeout 180 docker compose -f "$COMPOSE_FILE" up -d backend frontend

            ok=0
            for _ in {1..30}; do
              if curl -sf "$HEALTH_URL" >/dev/null 2>&1; then
                ok=1
                break
              fi
              sleep 2
            done

            if [ "$ok" -ne 1 ]; then
              echo "healthcheck failed"
              exit 1
            fi

            trap - ERR
            rm -f "$COMPOSE_FILE.bak"
