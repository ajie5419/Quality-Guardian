name: deploy

on:
  push:
    branches:
      - main
    tags:
      - 'release-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional image tag override (e.g. 1.2.4)'
        required: false
        type: string
      deploy_only:
        description: 'Skip image build/push and only run Deploy to ECS'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: ${{ secrets.ACR_REGISTRY }}/ajie5419/qms
      ECS_USER: ${{ secrets.ECS_USER || 'root' }}
      COMPOSE_FILE: /opt/qms/docker-compose.yml
      HEALTH_URL: http://127.0.0.1:3000/api/status
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare version
        id: version
        run: |
          REF_NAME="${GITHUB_REF_NAME}"
          EVENT="${GITHUB_EVENT_NAME}"
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          DEPLOY_ONLY="${{ github.event.inputs.deploy_only || 'false' }}"

          if [ "$DEPLOY_ONLY" = "true" ] && [ -z "$INPUT_VERSION" ]; then
            echo "When deploy_only=true, 'version' is required."
            exit 1
          fi

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [[ "$REF_NAME" == release-v* ]]; then
            VERSION="${REF_NAME#release-v}"
          else
            VERSION="$(date +%Y%m%d%H%M)-${GITHUB_SHA::7}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Login ACR
        if: ${{ github.event.inputs.deploy_only != 'true' }}
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ secrets.ACR_REGISTRY }}" \
            --username "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build backend image
        if: ${{ github.event.inputs.deploy_only != 'true' }}
        run: |
          docker build --platform linux/amd64 \
            -f infra/docker/Dockerfile.backend \
            -t "$IMAGE_REPO:backend-${{ steps.version.outputs.version }}" .

      - name: Build frontend image
        if: ${{ github.event.inputs.deploy_only != 'true' }}
        run: |
          docker build --platform linux/amd64 \
            -f infra/docker/Dockerfile.frontend \
            -t "$IMAGE_REPO:frontend-${{ steps.version.outputs.version }}" .

      - name: Push images
        if: ${{ github.event.inputs.deploy_only != 'true' }}
        run: |
          docker push "$IMAGE_REPO:backend-${{ steps.version.outputs.version }}"
          docker push "$IMAGE_REPO:frontend-${{ steps.version.outputs.version }}"

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ env.ECS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            set -x
            TAG='${{ steps.version.outputs.version }}'
            IMAGE_REPO='${{ env.IMAGE_REPO }}'
            COMPOSE_FILE='${{ env.COMPOSE_FILE }}'
            HEALTH_URL='${{ env.HEALTH_URL }}'

            if [ ! -f "$COMPOSE_FILE" ]; then
              ALT_COMPOSE_FILE="/opt/qms/infra/docker/docker-compose.yml"
              if [ -f "$ALT_COMPOSE_FILE" ]; then
                COMPOSE_FILE="$ALT_COMPOSE_FILE"
              else
                echo "compose file not found: $COMPOSE_FILE or $ALT_COMPOSE_FILE"
                exit 1
              fi
            fi

            cp "$COMPOSE_FILE" "$COMPOSE_FILE.bak"
            rollback() {
              cp "$COMPOSE_FILE.bak" "$COMPOSE_FILE" || true
              docker compose -f "$COMPOSE_FILE" up -d redis backend frontend || true
            }
            trap 'echo "deploy failed, rolling back compose and containers"; rollback' ERR

            run_with_timeout() {
              local seconds="$1"
              shift
              if command -v timeout >/dev/null 2>&1; then
                timeout "$seconds" "$@"
              else
                "$@"
              fi
            }

            PRISMA_CMD="/app/apps/backend/node_modules/.bin/prisma"

            sed -i.qms "/^  backend:/,/^  [^ ]/ s#^    image:.*#    image: ${IMAGE_REPO}:backend-${TAG}#" "$COMPOSE_FILE"
            sed -i.qms "/^  frontend:/,/^  [^ ]/ s#^    image:.*#    image: ${IMAGE_REPO}:frontend-${TAG}#" "$COMPOSE_FILE"
            rm -f "${COMPOSE_FILE}.qms"

            run_with_timeout 300 docker compose -f "$COMPOSE_FILE" pull backend frontend
            run_with_timeout 120 docker compose -f "$COMPOSE_FILE" up -d redis
            run_with_timeout 300 docker compose -f "$COMPOSE_FILE" run --rm backend sh -lc "$PRISMA_CMD migrate deploy || $PRISMA_CMD db push --skip-generate"
            run_with_timeout 180 docker compose -f "$COMPOSE_FILE" up -d backend frontend

            ok=0
            for _ in {1..30}; do
              if curl -sf "$HEALTH_URL" >/dev/null 2>&1; then
                ok=1
                break
              fi
              sleep 2
            done

            if [ "$ok" -ne 1 ]; then
              echo "healthcheck failed"
              exit 1
            fi

            trap - ERR
            rm -f "$COMPOSE_FILE.bak"
